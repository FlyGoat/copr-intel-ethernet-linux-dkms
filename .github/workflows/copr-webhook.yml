name: COPR Webhook

on:
  push:
    branches:
      - main
    paths:
      - "*-dkms.spec"
  workflow_dispatch:
    inputs:
      package:
        description: "COPR package name to rebuild, for example ice-dkms"
        required: true
        type: string

permissions:
  contents: read

jobs:
  trigger:
    name: Trigger changed COPR packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find packages to rebuild
        id: packages
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf '%s\n' "$INPUT_PACKAGE" > packages.txt
          else
            if [ -n "$BEFORE" ] &&
               [ "$BEFORE" != "0000000000000000000000000000000000000000" ] &&
               git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              git diff --name-only "$BEFORE" "$SHA" > changed.txt
            else
              git diff-tree --no-commit-id --name-only -r "$SHA" > changed.txt
            fi

            awk '/^[^/]+-dkms[.]spec$/ { sub(/[.]spec$/, ""); print }' changed.txt \
              | sort -u > packages.txt
          fi

          if [ ! -s packages.txt ]; then
            echo "No changed top-level DKMS spec files."
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Packages to rebuild:"
          sed 's/^/- /' packages.txt
          echo "has_packages=true" >> "$GITHUB_OUTPUT"
          {
            echo "packages<<EOF"
            cat packages.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger COPR package webhooks
        if: steps.packages.outputs.has_packages == 'true'
        shell: bash
        env:
          COPR_CUSTOM_WEBHOOK_BASE_URL: ${{ secrets.COPR_CUSTOM_WEBHOOK_BASE_URL }}
          PACKAGES: ${{ steps.packages.outputs.packages }}
        run: |
          set -euo pipefail

          if [ -z "${COPR_CUSTOM_WEBHOOK_BASE_URL:-}" ]; then
            echo "::error::Missing COPR_CUSTOM_WEBHOOK_BASE_URL repository secret"
            exit 1
          fi

          base="${COPR_CUSTOM_WEBHOOK_BASE_URL%/}"
          while IFS= read -r package; do
            [ -n "$package" ] || continue
            echo "Triggering COPR package: $package"
            curl --fail --show-error --silent \
              --request POST \
              "$base/$package/" \
              >/dev/null
          done <<< "$PACKAGES"
